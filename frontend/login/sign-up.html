<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BioVision</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 主容器改为flex布局，左右排列 */
        .main-container {
            display: flex;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 0 100px;
            box-sizing: border-box;
        }

        /* 左侧文字区域 */
        .left-text {
            flex: 1;
            color: white;
            font-size: 2.2rem;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0, 200, 200, 0.8);
            line-height: 1.6;
            margin-right: 40px;
            transform: translateY(-20px);
            animation: fadeInDown 2.0s 0s forwards;
        }

        .highlight {
            background: linear-gradient(90deg, #00ccdd 0%, #00bbaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .register-container {
            position: relative;
            width: 100%;
            max-width: 480px; /* 加宽注册框，和登录一致 */
            padding: 40px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 200, 200, 0.1), inset 0 0 15px rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .dna-icon {
            width: 45px;
            height: 55px;
            position: relative;
        }

        .dna-icon svg {
            width: 100%;
            height: 100%;
        }

        .main-title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(90deg, #00ccdd 0%, #00bbaa 50%, #00eedd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(0, 180, 200, 0.6));
            letter-spacing: 1px;
        }

        .sub-title {
            font-size: 15px;
            color: rgba(0, 180, 200, 0.8);
            text-transform: lowercase;
            filter: drop-shadow(0 0 8px rgba(0, 153, 170, 0.5));
            margin-top: 6px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            font-size: 15px;
            text-shadow: 0 0 5px rgba(0, 200, 200, 0.3);
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-size: 16px;
            color: white;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2), 0 0 15px rgba(0, 200, 200, 0.1);
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(0, 200, 200, 0.5);
            box-shadow: inset 0 2px 15px rgba(0, 0, 0, 0.2), 0 0 20px rgba(0, 200, 200, 0.3);
        }

        .register-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #00ccdd, #00bbaa);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 204, 221, 0.4), inset 0 2px 10px rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .register-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.5s;
        }

        .register-button:hover::before {
            left: 100%;
        }

        .register-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 204, 221, 0.6), inset 0 2px 15px rgba(255, 255, 255, 0.4);
        }

        .register-button:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .login-link a {
            color: rgba(0, 200, 200, 0.9);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
            text-shadow: 0 0 5px rgba(0, 200, 200, 0.3);
        }

        .login-link a:hover {
            color: #00eedd;
            text-decoration: underline;
        }

        /* 背景粒子效果 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(0, 220, 220, 0.8), transparent);
            border-radius: 50%;
            pointer-events: none;
            animation: float 12s infinite ease-in-out;
            box-shadow: 0 0 15px rgba(0, 220, 220, 0.8);
        }

        /* DNA粒子 */
        .dna-particle {
            position: absolute;
            pointer-events: none;
            animation: dna-float 18s infinite linear;
            opacity: 0.3;
            filter: drop-shadow(0 0 8px rgba(0, 220, 220, 0.6));
        }

        /* 小亚基粒子 */
        .small-subunit {
            position: absolute;
            pointer-events: none;
            animation: subunit-float 15s infinite linear;
            opacity: 0.35;
            filter: drop-shadow(0 0 8px rgba(0, 200, 180, 0.6));
        }

        /* 大亚基粒子 */
        .large-subunit {
            position: absolute;
            pointer-events: none;
            animation: subunit-float 20s infinite linear;
            opacity: 0.28;
            filter: drop-shadow(0 0 10px rgba(0, 180, 200, 0.6));
        }

        .dna-particle svg,
        .small-subunit svg,
        .large-subunit svg {
            width: 100%;
            height: 100%;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                opacity: 0.4;
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                opacity: 0.8;
                transform: translateY(-60px) rotate(180deg);
            }
        }

        @keyframes dna-float {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(100px, -50px) rotate(90deg);
            }
            50% {
                transform: translate(200px, 0) rotate(180deg);
            }
            75% {
                transform: translate(100px, 50px) rotate(270deg);
            }
            100% {
                transform: translate(0, 0) rotate(360deg);
            }
        }

        @keyframes subunit-float {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            33% {
                transform: translate(80px, -40px) rotate(120deg);
            }
            66% {
                transform: translate(160px, 0) rotate(240deg);
            }
            100% {
                transform: translate(0, 0) rotate(360deg);
            }
        }

        /* 注册框发光边框效果 */
        .register-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #97e3ec, #8ac2e5, #a5eae4, #b5f1f9, #ace5df);
            border-radius: 18px;
            z-index: -1;
            animation: border-glow 3s linear infinite;
            background-size: 400% 400%;
        }

        @keyframes border-glow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .register-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: inherit;
            border-radius: 16px;
            z-index: -1;
            filter: blur(20px);
            opacity: 0.6;
            margin: 4px;
        }
    </style>
</head>
<body>
    <video autoplay muted loop style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;">
  <source src="../video/DAN-animation.mp4" type="video/mp4">
</video>
    <div class="particles" id="particles"></div>
    
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧文字区域 -->
        <div class="left-text">
            欢迎加入<span class="highlight">生物视界</span><br>
            <span style="font-size: 20px;">一起探索生物的无限可能</span>
        </div>

        <div class="register-container">
            <div class="logo-container">
                <div class="logo-text">
                    <div class="dna-icon">
                        <svg viewBox="0 0 30 45" xmlns="http://www.w3.org/2000/svg">
                            <path d="M 8 3 Q 5 10, 8 20 Q 11 30, 8 40" stroke="#00ccdd" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                            <path d="M 22 3 Q 25 10, 22 20 Q 19 30, 22 40" stroke="#00bbaa" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                            <line x1="8" y1="12" x2="22" y2="12" stroke="#00ccdd" stroke-width="1.5" opacity="0.8"/>
                            <line x1="22" y1="25" x2="8" y2="25" stroke="#00bbaa" stroke-width="1.5" opacity="0.8"/>
                            <line x1="8" y1="35" x2="22" y2="35" stroke="#00ccdd" stroke-width="1.5" opacity="0.8"/>
                        </svg>
                    </div>
                    <div>
                        <div class="main-title">BioVision</div>
                        <div class="sub-title">生物视界</div>
                    </div>
                </div>
            </div>

            <form id="registerForm">
                <div class="input-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" class="input-field" placeholder="请输入用户名">
                </div>

                <div class="input-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="input-field" placeholder="请输入密码">
                </div>

                <div class="input-group">
                    <label for="phone">电话</label>
                    <input type="tel" id="phone" class="input-field" placeholder="请输入手机号">
                </div>

                <button type="submit" class="register-button">注册</button>
            </form>

            <div class="login-link">
                已有账户? <a href="login-main.html">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api';

        function showAlert(message, type = 'error') {
            const alertDiv = document.createElement('div');
            alertDiv.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                padding: 16px 24px;
                background: ${type === 'success' ? '#00bbaa' : '#dc2626'};
                color: white;
                border-radius: 10px;
                font-size: 15px;
                z-index: 1000;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                animation: fadeIn 0.3s ease;
            `;
            alertDiv.textContent = message;
            
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeIn {
                    from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
                    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                }
            `;
            document.head.appendChild(style);
            document.body.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.style.opacity = '0';
                setTimeout(() => alertDiv.remove(), 300);
            }, 2500);
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value.trim();
            const registerBtn = document.querySelector('.register-button');

            if (!username || !password || !phone) {
                showAlert('请填写完整的注册信息');
                return;
            }

            if (username.length < 1 || username.length > 20) {
                showAlert('用户名长度必须在1-20个字符之间');
                return;
            }

            if (password.length < 6 || password.length > 20) {
                showAlert('密码长度必须在6-20个字符之间');
                return;
            }

            if (!/[A-Za-z]/.test(password) || !/[0-9]/.test(password)) {
                showAlert('密码必须同时包含字母和数字');
                return;
            }

            const phoneRegex = /^1[3-9]\d{9}$/;
            if (!phoneRegex.test(phone)) {
                showAlert('请输入有效的手机号码');
                return;
            }

            registerBtn.textContent = '注册中...';
            registerBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        telephone: phone
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('注册成功！', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'login screen.html';
                    }, 1500);
                } else {
                    showAlert(data.msg || '注册失败');
                }
            } catch (error) {
                console.error('注册错误:', error);
                showAlert('网络错误，请稍后重试');
            } finally {
                registerBtn.textContent = '注册';
                registerBtn.disabled = false;
            }
        });

        const inputs = document.querySelectorAll('.input-field');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });

        window.addEventListener('load', () => {
            generateParticles();
            console.log('BioVision 注册界面已加载');
        });
    </script>
</body>
</html>
