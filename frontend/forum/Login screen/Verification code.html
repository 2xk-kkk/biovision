<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BioVision</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 主容器 - 左右排列 */
        .main-container {
            display: flex;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 0 100px;
            box-sizing: border-box;
        }

        /* 左侧文字区域 */
        .left-text {
            flex: 1;
            color: white;
            font-size: 2.2rem;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0, 200, 200, 0.8);
            line-height: 1.6;
            margin-right: 40px;
            transform: translateY(-20px);
            animation: fadeInDown 2.0s 0s forwards;
        }

        .highlight {
            background: linear-gradient(90deg, #00ccdd 0%, #00bbaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 200, 200, 0.1), inset 0 0 15px rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .dna-icon {
            width: 45px;
            height: 55px;
            position: relative;
        }

        .dna-icon svg {
            width: 100%;
            height: 100%;
        }

        .main-title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(90deg, #00ccdd 0%, #00bbaa 50%, #00eedd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(0, 180, 200, 0.6));
            letter-spacing: 1px;
        }

        .sub-title {
            font-size: 15px;
            color: rgba(0, 180, 200, 0.8);
            text-transform: lowercase;
            filter: drop-shadow(0 0 8px rgba(0, 153, 170, 0.5));
            margin-top: 6px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            font-size: 15px;
            text-shadow: 0 0 5px rgba(0, 200, 200, 0.3);
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-size: 16px;
            color: white;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2), 0 0 15px rgba(0, 200, 200, 0.1);
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(0, 200, 200, 0.5);
            box-shadow: inset 0 2px 15px rgba(0, 0, 0, 0.2), 0 0 20px rgba(0, 200, 200, 0.3);
        }

        /* 电话 + 验证码按钮 并排布局 */
        .phone-group {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .phone-group .input-field {
            flex: 1;
        }

        .send-code-btn {
            padding: 16px 20px;
            background: rgba(0, 200, 200, 0.2);
            color: #00eedd;
            border: 1px solid rgba(0, 200, 200, 0.4);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-shadow: 0 0 5px rgba(0, 200, 200, 0.3);
        }

        .send-code-btn:hover {
            background: rgba(0, 200, 200, 0.35);
            box-shadow: 0 0 15px rgba(0, 200, 200, 0.3);
        }

        .send-code-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #00ccdd, #00bbaa);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 204, 221, 0.4), inset 0 2px 10px rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.5s;
        }

        .login-button:hover::before {
            left: 100%;
        }

        .login-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 204, 221, 0.6), inset 0 2px 15px rgba(255, 255, 255, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .password-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .password-link a {
            color: rgba(0, 200, 200, 0.9);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
            text-shadow: 0 0 5px rgba(0, 200, 200, 0.3);
        }

        .password-link a:hover {
            color: #00eedd;
            text-decoration: underline;
        }

        /* 纯CSS内置背景粒子动画 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(0, 220, 220, 0.8), transparent);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s infinite ease-in-out;
            box-shadow: 0 0 15px rgba(0, 220, 220, 0.8);
        }

        .particle:nth-child(1) { width: 6px; height: 6px; left: 10%; top: 20%; animation-duration: 12s; animation-delay: 0s; }
        .particle:nth-child(2) { width: 8px; height: 8px; left: 25%; top: 60%; animation-duration: 18s; animation-delay: 2s; }
        .particle:nth-child(3) { width: 4px; height: 4px; left: 40%; top: 15%; animation-duration: 14s; animation-delay: 4s; }
        .particle:nth-child(4) { width: 10px; height: 10px; left: 60%; top: 70%; animation-duration: 20s; animation-delay: 1s; }
        .particle:nth-child(5) { width: 5px; height: 5px; left: 75%; top: 30%; animation-duration: 16s; animation-delay: 3s; }
        .particle:nth-child(6) { width: 7px; height: 7px; left: 90%; top: 50%; animation-duration: 13s; animation-delay: 5s; }
        .particle:nth-child(7) { width: 6px; height: 6px; left: 15%; top: 80%; animation-duration: 17s; animation-delay: 2s; }
        .particle:nth-child(8) { width: 9px; height: 9px; left: 50%; top: 40%; animation-duration: 15s; animation-delay: 0s; }
        .particle:nth-child(9) { width: 4px; height: 4px; left: 85%; top: 10%; animation-duration: 19s; animation-delay: 3s; }
        .particle:nth-child(10) { width: 8px; height: 8px; left: 5%; top: 45%; animation-duration: 14s; animation-delay: 1s; }
        .particle:nth-child(11) { width: 5px; height: 5px; left: 30%; top: 90%; animation-duration: 16s; animation-delay: 4s; }
        .particle:nth-child(12) { width: 7px; height: 7px; left: 65%; top: 25%; animation-duration: 18s; animation-delay: 2s; }
        .particle:nth-child(13) { width: 6px; height: 6px; left: 80%; top: 75%; animation-duration: 13s; animation-delay: 5s; }
        .particle:nth-child(14) { width: 9px; height: 9px; left: 20%; top: 35%; animation-duration: 20s; animation-delay: 0s; }
        .particle:nth-child(15) { width: 5px; height: 5px; left: 55%; top: 85%; animation-duration: 15s; animation-delay: 3s; }
        .particle:nth-child(16) { width: 8px; height: 8px; left: 35%; top: 5%; animation-duration: 17s; animation-delay: 1s; }
        .particle:nth-child(17) { width: 4px; height: 4px; left: 70%; top: 55%; animation-duration: 14s; animation-delay: 4s; }
        .particle:nth-child(18) { width: 7px; height: 7px; left: 95%; top: 80%; animation-duration: 16s; animation-delay: 2s; }
        .particle:nth-child(19) { width: 6px; height: 6px; left: 45%; top: 65%; animation-duration: 18s; animation-delay: 0s; }
        .particle:nth-child(20) { width: 10px; height: 10px; left: 10%; top: 55%; animation-duration: 19s; animation-delay: 3s; }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                opacity: 0.4;
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                opacity: 0.8;
                transform: translateY(-60px) rotate(180deg);
            }
        }

        /* 登录框发光边框效果 */
        .login-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #97e3ec, #8ac2e5, #a5eae4, #b5f1f9, #ace5df);
            border-radius: 18px;
            z-index: -1;
            animation: border-glow 3s linear infinite;
            background-size: 400% 400%;
        }

        @keyframes border-glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: inherit;
            border-radius: 16px;
            z-index: -1;
            filter: blur(20px);
            opacity: 0.6;
            margin: 4px;
        }
    </style>
</head>
<body>
    <video autoplay muted loop style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;">
  <source src="DAN animation.mp4" type="video/mp4">
</video>
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧文字区域 -->
        <div class="left-text">
            <div class="highlight">生物视界</div>
            <div>一种新的学习方式</div>
        </div>

        <div class="login-container">
            <div class="logo-container">
                <div class="logo-text">
                    <div class="dna-icon">
                        <svg viewBox="0 0 30 45" xmlns="http://www.w3.org/2000/svg">
                            <path d="M 8 3 Q 5 10, 8 20 Q 11 30, 8 40" stroke="#00ccdd" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                            <path d="M 22 3 Q 25 10, 22 20 Q 19 30, 22 40" stroke="#00bbaa" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                            <line x1="8" y1="12" x2="22" y2="12" stroke="#00ccdd" stroke-width="1.5" opacity="0.8"/>
                            <line x1="22" y1="25" x2="8" y2="25" stroke="#00bbaa" stroke-width="1.5" opacity="0.8"/>
                            <line x1="8" y1="35" x2="22" y2="35" stroke="#00ccdd" stroke-width="1.5" opacity="0.8"/>
                        </svg>
                    </div>
                    <div>
                        <div class="main-title">BioVision</div>
                        <div class="sub-title">验证码登录</div>
                    </div>
                </div>
            </div>

            <form id="loginForm">
                <!-- 第一项：电话号码 + 发送验证码 -->
                <div class="input-group">
                    <label for="phone">电话号码</label>
                    <div class="phone-group">
                        <input type="tel" id="phone" class="input-field" placeholder="请输入手机号">
                        <button type="button" class="send-code-btn" id="sendCodeBtn" style="color:whitesmoke">发送验证码</button>
                    </div>
                </div>

                <!-- 第二项：验证码 -->
                <div class="input-group">
                    <label for="code">验证码</label>
                    <input type="text" id="code" class="input-field" placeholder="请输入验证码" maxlength="6">
                </div>

                <button type="submit" class="login-button">登录</button>
            </form>

            <div class="password-link">
                <a href="login screen.html">密码登录</a>
            </div>
        </div>
    </div>

    <script>
        // 发送验证码倒计时
        let countdown = 60;
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        
        sendCodeBtn.addEventListener('click', function() {
            const phone = document.getElementById('phone').value;
            
            if (!phone || phone.length !== 11) {
                alert('请输入正确的手机号');
                return;
            }

            // 开始倒计时
            sendCodeBtn.disabled = true;
            sendCodeBtn.textContent = `${countdown}秒后重发`;

            const timer = setInterval(() => {
                countdown--;
                sendCodeBtn.textContent = `${countdown}秒后重发`;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '发送验证码';
                    countdown = 60;
                }
            }, 1000);
        });

        // 表单提交处理
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const code = document.getElementById('code').value;

            if (phone && code) {
                const loginBtn = document.querySelector('.login-button');
                loginBtn.textContent = '登录中...';
                loginBtn.disabled = true;
                
                setTimeout(() => {
                    alert('登录成功！');
                    window.location.href = 'loading animation.html';
                }, 1500);
            } else {
                alert('请填写完整信息');
            }
        });

        // 输入框焦点效果
        const inputs = document.querySelectorAll('.input-field');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
