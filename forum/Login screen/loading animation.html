<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioVision 精准转场动画融合版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* === 第一阶段：Logo分解动画 === */
        
        /* 动画舞台 */
        .stage {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 900px;
            height: 400px;
            animation: stage-fade-out 3.5s ease-in-out forwards;
        }

        @keyframes stage-fade-out {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 颜色与渐变定义 */
        :root {
            --glow-color: rgba(126, 226, 232, 0.6);
            --main-gradient: linear-gradient(to bottom, #005a9e, #7ee2e8);
        }

        /* SVG 图形 */
        .svg-icon {
            position: absolute;
            transition: all 2.2s cubic-bezier(0.6, 0, 0.2, 1);
            filter: drop-shadow(0 0 12px var(--glow-color));
            z-index: 10;
        }

        /* DNA 图形 */
        .dna-svg { 
            width: 120px; 
            height: 200px; 
            animation: dna-move 3.5s ease-in-out forwards;
        }
        .dna-strand { fill: none; stroke: #7ee2e8; stroke-width: 10; stroke-linecap: round; }
        .dna-bar { stroke: #0099aa; stroke-width: 6; opacity: 0.6; }

        /* 眼睛图形 */
        .eye-svg { 
            width: 320px; 
            height: 200px; 
            animation: eye-move 3.5s ease-in-out forwards;
        }
        .eye-outer { fill: none; stroke: #7ee2e8; stroke-width: 10; stroke-linejoin: round; }
        .eye-wing { fill: #005a9e; opacity: 0.7; }
        .eye-pupil { fill: #000; stroke: #7ee2e8; stroke-width: 2; }

        /* DNA 移动动画 - 向左移动并缩小，然后移动到文字B的位置 */
        @keyframes dna-move {
            0% {
                transform: translate(0, 0) scale(1);
                filter: drop-shadow(0 0 12px var(--glow-color));
                opacity: 1;
                z-index: 10;
            }
            60% {
                transform: translate(-315px, 0) scale(0.65);
                filter: drop-shadow(0 0 10px rgba(0, 153, 170, 0.5));
                opacity: 1;
                z-index: 10;
            }
            70% {
                opacity: 1;
                z-index: 30;
            }
            100% {
                transform: translate(-450px, -60px) scale(0.65);
                filter: drop-shadow(0 0 10px rgba(0, 153, 170, 0.5));
                opacity: 1;
                z-index: 30;
            }
        }

        /* 眼睛移动动画 - 向右移动并缩小，然后移动到文字O的位置 */
        @keyframes eye-move {
            0% {
                transform: translate(0, 0) scale(1.1);
                filter: drop-shadow(0 0 12px var(--glow-color));
                opacity: 1;
                z-index: 10;
            }
            60% {
                transform: translate(80px, 5px) scale(0.35);
                filter: drop-shadow(0 0 10px rgba(0, 153, 170, 0.5));
                opacity: 1;
                z-index: 10;
            }
            70% {
                opacity: 1;
                z-index: 30;
            }
            100% {
                transform: translate(200px, -60px) scale(0.35);
                filter: drop-shadow(0 0 10px rgba(0, 153, 170, 0.5));
                opacity: 1;
                z-index: 30;
            }
        }

        /* 文字层 */
        .text-container {
            display: flex;
            align-items: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 2.2s cubic-bezier(0.6, 0, 0.2, 1);
            pointer-events: none;
        }

        .main-text {
            font-size: 110px;
            font-weight: 900;
            background: var(--main-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -3px;
        }

        /* 初始状态下的 biovision 文字 */
        .init-label {
            position: absolute;
            bottom: 40px;
            color: #7ee2e8;
            font-size: 50px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 1.2s ease;
            filter: drop-shadow(0 0 8px var(--glow-color));
            animation: init-label-fade 3.5s ease-in-out forwards;
        }

        @keyframes init-label-fade {
            0%, 65% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 初始状态：Logo1 叠放 */
        .state-init .dna-svg { 
            transform: translate(0, 0) scale(1); 
        }

        .state-init .eye-svg { 
            transform: translate(0, 0) scale(1.1);
        }

        /* === 第二阶段：文字Logo === */

        /* 背景粒子效果 */
        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(0, 200, 200, 0.6), transparent);
            border-radius: 50%;
            pointer-events: none;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { 
                opacity: 0; 
                transform: translateY(0px);
            }
            50% { 
                opacity: 0.6;
                transform: translateY(-50px);
            }
        }

        /* 文字logo容器 */
        .stage-2 {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            animation: stage2-transition 3.5s ease-in-out forwards;
            opacity: 0;
        }

        @keyframes stage2-transition {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            60% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 文字logo - 主容器 */
        .text-logo {
            display: flex;
            align-items: center;
            gap: 0px;
            position: relative;
        }

        /* DNA螺旋 - 从原始DNA动画元素过渡过来 */
        .dna-text {
            width: 100px;
            height: 120px;
            position: relative;
            animation: dna-float 3s ease-in-out infinite;
            margin-right: -5px;
            transition: all 2.2s cubic-bezier(0.6, 0, 0.2, 1);
        }

        @keyframes dna-float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .dna-text svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px rgba(0, 153, 170, 0.6));
        }

        /* 主文字 */
        .stage-2 .main-text {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00ccdd 0%, #00bbaa 50%, #00eedd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(0, 180, 200, 0.6));
            animation: text-glow 2.5s ease-in-out infinite;
            position: relative;
            display: flex;
            align-items: center;
        }

        @keyframes text-glow {
            0%, 100% {
                filter: drop-shadow(0 0 12px rgba(0, 180, 200, 0.6));
            }
            50% {
                filter: drop-shadow(0 0 25px rgba(0, 180, 200, 0.9));
            }
        }

        /* 眼睛logo - 嵌入文字中间 */
        .eye-inline {
            width: 60px;
            height: 55px;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 -12px;
            animation: eye-blink 4s ease-in-out infinite;
            transition: all 2.2s cubic-bezier(0.6, 0, 0.2, 1);
        }

        @keyframes eye-blink {
            0%, 10%, 90%, 100% {
                transform: scaleY(1);
            }
            95% {
                transform: scaleY(0.05);
            }
        }

        .eye-inline svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px rgba(0, 153, 170, 0.6));
        }

        /* "biovision" 文字 */
        .logo-text-bottom {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #0099aa;
            text-transform: lowercase;
            filter: drop-shadow(0 0 6px rgba(0, 153, 170, 0.5));
            margin-top: 10px;
            opacity: 0;
            animation: bottom-text-fade 0.8s ease-out 3.5s forwards;
        }

        @keyframes bottom-text-fade {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .stage {
                width: 100%;
                height: 300px;
            }

            .stage-2 .main-text {
                font-size: 48px;
            }

            .dna-text {
                width: 80px;
                height: 100px;
                margin-right: -3px;
            }

            .eye-inline {
                width: 50px;
                height: 45px;
                margin: 0 -10px;
            }

            .logo-text-bottom {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .stage {
                width: 100%;
                height: 250px;
            }

            .stage-2 .main-text {
                font-size: 36px;
            }

            .dna-text {
                width: 60px;
                height: 80px;
                margin-right: -2px;
            }

            .eye-inline {
                width: 40px;
                height: 35px;
                margin: 0 -8px;
            }

            .logo-text-bottom {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        
        <!-- 阶段 1: Logo分解动画 -->
        <div class="stage state-init" id="mainStage">
            
            <div class="init-label">biovision</div>

            <!-- 眼睛：充当第二个 O -->
            <svg class="svg-icon eye-svg" viewBox="0 0 400 200">
                <path class="eye-wing" d="M130,100 Q155,45 195,45 L195,155 Q155,155 130,100 Z" />
                <path class="eye-wing" d="M270,100 Q245,45 205,45 L205,155 Q245,155 270,100 Z" />
                <path class="eye-outer" d="M50,100 L200,25 L350,100 L200,175 Z" />
                <circle class="eye-pupil" cx="200" cy="100" r="28" />
            </svg>

            <!-- DNA：充当字母 B -->
            <svg class="svg-icon dna-svg" viewBox="0 0 100 200">
                <path class="dna-strand" d="M30,20 Q10,60 30,100 T30,180" />
                <path class="dna-strand" d="M70,20 Q90,60 70,100 T70,180" />
                <line class="dna-bar" x1="32" y1="40" x2="68" y2="40" />
                <line class="dna-bar" x1="28" y1="80" x2="72" y2="80" />
                <line class="dna-bar" x1="32" y1="120" x2="68" y2="120" />
                <line class="dna-bar" x1="28" y1="160" x2="72" y2="160" />
            </svg>

            <!-- 文字容器 -->
            <div class="text-container main-text">
                <div class="dna-placeholder"></div>
                <span>iovisi</span>
                <span class="eye-o-gap"></span>
                <span>n</span>
            </div>
        </div>

        <!-- 阶段 2: 文字logo -->
        <div class="stage-2" id="stage2">
            <div class="text-logo">
                <!-- DNA螺旋部分 - 这是从原DNA动画元素过渡过来的 -->
                <div class="dna-text">
                    <svg viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="dnaGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#00ccdd;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#0099aa;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <!-- DNA双螺旋 -->
                        <path d="M 15 5 Q 8 15, 15 30 Q 22 45, 15 60 Q 8 75, 15 95" 
                              fill="none" stroke="url(#dnaGradient2)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M 45 5 Q 52 15, 45 30 Q 38 45, 45 60 Q 52 75, 45 95" 
                              fill="none" stroke="url(#dnaGradient2)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                        
                        <!-- 连接纹理 -->
                        <line x1="15" y1="20" x2="45" y2="20" stroke="#0099aa" stroke-width="4" opacity="0.7" stroke-linecap="round"/>
                        <line x1="45" y1="50" x2="15" y2="50" stroke="#00ccdd" stroke-width="4" opacity="0.7" stroke-linecap="round"/>
                        <line x1="15" y1="80" x2="45" y2="80" stroke="#0099aa" stroke-width="4" opacity="0.7" stroke-linecap="round"/>
                    </svg>
                </div>

                <!-- 主文字容器 -->
                <div class="main-text">
                    <span>ioVisi</span><span class="eye-inline">
                        <svg viewBox="0 0 50 45" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="eyeGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#00ccdd;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#0099aa;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <!-- 眼睛杏仁形轮廓 -->
                            <path d="M 8 22.5 Q 25 10, 42 22.5 Q 25 35, 8 22.5" 
                                  fill="none" stroke="url(#eyeGradient2)" stroke-width="3" stroke-linecap="round"/>
                            
                            <!-- 眼睛上下线 -->
                            <path d="M 12 22.5 Q 25 15, 38 22.5" 
                                  fill="none" stroke="#00ccdd" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
                            <path d="M 12 22.5 Q 25 30, 38 22.5" 
                                  fill="none" stroke="#0099aa" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
                            
                            <!-- 虹膜 -->
                            <circle cx="25" cy="22.5" r="6" fill="none" stroke="#0099aa" stroke-width="2"/>
                            
                            <!-- 瞳孔 -->
                            <circle cx="25" cy="22.5" r="4" fill="#000000"/>
                            
                            <!-- 高光 -->
                            <circle cx="27" cy="20" r="1.5" fill="#ffffff" opacity="0.95"/>
                        </svg>
                    </span><span>n</span>
                </div>
            </div>

            <!-- BioVision 文字 -->
            <div class="logo-text-bottom">biovision</div>
        </div>
    </div>

    <script>
        // 生成背景粒子
        function generateParticles() {
            const container = document.getElementById('container');
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 5 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                
                const duration = Math.random() * 6 + 8;
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = Math.random() * 3 + 's';
                
                container.appendChild(particle);
            }
        }

        generateParticles();

        // 自动启动融合动画
        window.addEventListener('load', () => {
            console.log('BioVision 融合动画已启动！');
            
            // 动画会自动完成，DNA和眼睛元素会直接移动到第二阶段的对应位置
            setTimeout(() => {
                console.log('Logo分解动画完成，文字logo开始呈现...');
            }, 3500);

            setTimeout(() => {
                console.log('完整动画序列已完成！');
            }, 4300);
        });
        setTimeout(() => {
                window.location.href = "../Main page\\change.html"; // 替换为目标页面地址
        }, 7000); // 7000 毫秒 = 7 秒
    </script>
</body>
</html>
